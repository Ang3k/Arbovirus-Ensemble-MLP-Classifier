<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificador de Arboviroses</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <h1>Classificador de Arboviroses</h1>
    <p class="subtitle">Ensemble de MLP + LightGBM + XGBoost para classificação de Dengue e Chikungunya</p>

    <form id="patientForm">

        <!-- Disease selection -->
        <div class="form-section">
            <h2>Tipo de Doença</h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="disease_type">Doença a classificar</label>
                    <select id="disease_type" name="disease_type" required>
                        <option value="dengue">Dengue</option>
                        <option value="chikungunya">Chikungunya</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Demographics -->
        <div class="form-section">
            <h2>Dados Demográficos</h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="age">Idade</label>
                    <input type="number" id="age" name="age" min="0" max="120" required>
                </div>
                <div class="form-group">
                    <label for="sex">Sexo</label>
                    <select id="sex" name="sex">
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                        <option value="Ignorado">Ignorado</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="pregnancy_status">Gestante</label>
                    <select id="pregnancy_status" name="pregnancy_status">
                        <option value="Não se aplica">Não se aplica</option>
                        <option value="Não">Não</option>
                        <option value="1º Trimestre">1º Trimestre</option>
                        <option value="2º Trimestre">2º Trimestre</option>
                        <option value="3º Trimestre">3º Trimestre</option>
                        <option value="Idade gestacional ignorada">Idade gestacional ignorada</option>
                        <option value="Ignorado">Ignorado</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="race">Raça/Cor</label>
                    <select id="race" name="race">
                        <option value="Branca">Branca</option>
                        <option value="Preta">Preta</option>
                        <option value="Amarela">Amarela</option>
                        <option value="Parda">Parda</option>
                        <option value="Indígena">Indígena</option>
                        <option value="Ignorado">Ignorado</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="education_level">Escolaridade</label>
                    <select id="education_level" name="education_level">
                        <option value="Ignorado">Ignorado</option>
                        <option value="Analfabeto">Analfabeto</option>
                        <option value="1ª a 4ª série incompleta">1ª a 4ª série incompleta</option>
                        <option value="4ª série completa">4ª série completa</option>
                        <option value="5ª à 8ª série incompleta">5ª à 8ª série incompleta</option>
                        <option value="Ensino fundamental completo">Ensino fundamental completo</option>
                        <option value="Ensino médio incompleto">Ensino médio incompleto</option>
                        <option value="Ensino médio completo">Ensino médio completo</option>
                        <option value="Educação superior incompleta">Educação superior incompleta</option>
                        <option value="Educação superior completa">Educação superior completa</option>
                        <option value="Não se aplica">Não se aplica</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="residence_state">Estado de Residência</label>
                    <select id="residence_state" name="residence_state">
                        <option value="Acre">Acre</option>
                        <option value="Alagoas">Alagoas</option>
                        <option value="Amapá">Amapá</option>
                        <option value="Amazonas">Amazonas</option>
                        <option value="Bahia">Bahia</option>
                        <option value="Ceará">Ceará</option>
                        <option value="Distrito Federal">Distrito Federal</option>
                        <option value="Espírito Santo">Espírito Santo</option>
                        <option value="Goiás">Goiás</option>
                        <option value="Maranhão">Maranhão</option>
                        <option value="Mato Grosso">Mato Grosso</option>
                        <option value="Mato Grosso do Sul">Mato Grosso do Sul</option>
                        <option value="Minas Gerais">Minas Gerais</option>
                        <option value="Pará">Pará</option>
                        <option value="Paraíba">Paraíba</option>
                        <option value="Paraná">Paraná</option>
                        <option value="Pernambuco">Pernambuco</option>
                        <option value="Piauí">Piauí</option>
                        <option value="Rio de Janeiro">Rio de Janeiro</option>
                        <option value="Rio Grande do Norte">Rio Grande do Norte</option>
                        <option value="Rio Grande do Sul">Rio Grande do Sul</option>
                        <option value="Rondônia">Rondônia</option>
                        <option value="Roraima">Roraima</option>
                        <option value="Santa Catarina">Santa Catarina</option>
                        <option value="São Paulo" selected>São Paulo</option>
                        <option value="Sergipe">Sergipe</option>
                        <option value="Tocantins">Tocantins</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group autocomplete-wrapper">
                    <label for="occupation_code">Ocupação (CBO)</label>
                    <input type="text" id="occupation_code" name="occupation_code" placeholder="Digite para buscar..." autocomplete="off">
                    <div id="cboList" class="autocomplete-list"></div>
                </div>
            </div>
        </div>

        <!-- Dates -->
        <div class="form-section">
            <h2>Datas</h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="symptom_onset_date">Data de Início dos Sintomas</label>
                    <input type="date" id="symptom_onset_date" name="symptom_onset_date" required>
                </div>
                <div class="form-group">
                    <label for="notification_date">Data de Notificação</label>
                    <input type="date" id="notification_date" name="notification_date">
                </div>
            </div>
        </div>

        <!-- Symptoms -->
        <div class="form-section">
            <h2>Sintomas</h2>
            <div class="checkbox-grid">
                <div class="checkbox-item">
                    <input type="checkbox" id="fever" name="fever">
                    <label for="fever">Febre</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="headache" name="headache">
                    <label for="headache">Cefaleia (Dor de cabeça)</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="myalgia" name="myalgia">
                    <label for="myalgia">Mialgia (Dor muscular)</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="joint_pain" name="joint_pain">
                    <label for="joint_pain">Artralgia (Dor articular)</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="retro_orbital_pain" name="retro_orbital_pain">
                    <label for="retro_orbital_pain">Dor retro-orbital</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="nausea" name="nausea">
                    <label for="nausea">Náusea</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="vomiting" name="vomiting">
                    <label for="vomiting">Vômito</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="rash" name="rash">
                    <label for="rash">Exantema (Erupção cutânea)</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="back_pain" name="back_pain">
                    <label for="back_pain">Dor nas costas</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="conjunctivitis" name="conjunctivitis">
                    <label for="conjunctivitis">Conjuntivite</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="arthritis" name="arthritis">
                    <label for="arthritis">Artrite</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="petechiae" name="petechiae">
                    <label for="petechiae">Petéquias</label>
                </div>
            </div>
        </div>

        <!-- Comorbidities -->
        <div class="form-section">
            <h2>Comorbidades</h2>
            <div class="checkbox-grid">
                <div class="checkbox-item">
                    <input type="checkbox" id="diabetes" name="diabetes">
                    <label for="diabetes">Diabetes</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="hypertension" name="hypertension">
                    <label for="hypertension">Hipertensão</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="blood_disorder" name="blood_disorder">
                    <label for="blood_disorder">Doença hematológica</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="liver_disease" name="liver_disease">
                    <label for="liver_disease">Hepatopatia</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="kidney_disease" name="kidney_disease">
                    <label for="kidney_disease">Doença renal</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="peptic_ulcer" name="peptic_ulcer">
                    <label for="peptic_ulcer">Doença ácido-péptica</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="autoimmune_disease" name="autoimmune_disease">
                    <label for="autoimmune_disease">Doença autoimune</label>
                </div>
            </div>
        </div>

        <!-- Hemorrhagic manifestations -->
        <div class="form-section">
            <h2>Manifestações Hemorrágicas</h2>
            <div class="checkbox-grid">
                <div class="checkbox-item">
                    <input type="checkbox" id="nosebleed" name="nosebleed">
                    <label for="nosebleed">Epistaxe (Sangramento nasal)</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="gum_bleeding" name="gum_bleeding">
                    <label for="gum_bleeding">Gengivorragia</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="metrorrhagia" name="metrorrhagia">
                    <label for="metrorrhagia">Metrorragia</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="petechiae_hemorrh" name="petechiae_hemorrh">
                    <label for="petechiae_hemorrh">Petéquias (hemorrágicas)</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="hematuria" name="hematuria">
                    <label for="hematuria">Hematúria</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="other_bleeding" name="other_bleeding">
                    <label for="other_bleeding">Outros sangramentos</label>
                </div>
            </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Analisar</button>
    </form>

    <!-- Result -->
    <div class="result-card" id="resultCard">
        <h2>Resultado da Classificação</h2>
        <div id="resultContent"></div>
    </div>
</div>

<script>
// CBO autocomplete
const cboInput = document.getElementById('occupation_code');
const cboList = document.getElementById('cboList');
let cboData = [];

fetch('/static/cbo_list.json')
    .then(r => r.json())
    .then(data => { cboData = data; })
    .catch(() => { /* CBO list not available */ });

cboInput.addEventListener('input', () => {
    const query = cboInput.value.toUpperCase().trim();
    if (query.length < 2) { cboList.style.display = 'none'; return; }

    const matches = cboData.filter(name => name.includes(query)).slice(0, 15);
    if (matches.length === 0) { cboList.style.display = 'none'; return; }

    cboList.innerHTML = matches.map(m => `<div>${m}</div>`).join('');
    cboList.style.display = 'block';

    cboList.querySelectorAll('div').forEach(el => {
        el.addEventListener('click', () => {
            cboInput.value = el.textContent;
            cboList.style.display = 'none';
        });
    });
});

document.addEventListener('click', (e) => {
    if (!cboInput.contains(e.target) && !cboList.contains(e.target)) {
        cboList.style.display = 'none';
    }
});

// Form submission
document.getElementById('patientForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Analisando...';

    const form = e.target;
    const checkboxes = ['fever', 'headache', 'myalgia', 'joint_pain', 'retro_orbital_pain',
        'nausea', 'vomiting', 'rash', 'back_pain', 'conjunctivitis', 'arthritis', 'petechiae',
        'diabetes', 'hypertension', 'blood_disorder', 'liver_disease', 'kidney_disease',
        'peptic_ulcer', 'autoimmune_disease', 'nosebleed', 'gum_bleeding', 'metrorrhagia',
        'petechiae_hemorrh', 'hematuria', 'other_bleeding'];

    const data = {
        disease_type: form.disease_type.value,
        age: parseInt(form.age.value),
        sex: form.sex.value,
        pregnancy_status: form.pregnancy_status.value,
        race: form.race.value,
        education_level: form.education_level.value,
        occupation_code: form.occupation_code.value || '',
        residence_state: form.residence_state.value,
        symptom_onset_date: form.symptom_onset_date.value,
        notification_date: form.notification_date.value || null,
    };

    checkboxes.forEach(cb => {
        data[cb] = form[cb].checked ? 1 : 0;
    });

    try {
        const resp = await fetch('/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
        });
        const result = await resp.json();
        showResult(result, data.disease_type);
    } catch (err) {
        showError('Erro de conexão com o servidor.');
    }

    btn.disabled = false;
    btn.textContent = 'Analisar';
});

function showResult(r, disease) {
    const card = document.getElementById('resultCard');
    const content = document.getElementById('resultContent');

    if (r.error) {
        content.innerHTML = `<div class="error-msg">${r.error}</div>`;
        card.style.display = 'block';
        return;
    }

    const diseaseName = disease === 'dengue' ? 'Dengue' : 'Chikungunya';
    const isPositive = r.final_prediction === 1;
    const cls = isPositive ? 'result-positive' : 'result-negative';
    const text = isPositive
        ? `Classificação: Positivo para ${diseaseName}`
        : `Classificação: Negativo para ${diseaseName}`;

    const pct = (v) => (v * 100).toFixed(1) + '%';
    const barColor = (v) => v > 0.4 ? '#e74c3c' : '#27ae60';

    content.innerHTML = `
        <div class="result-final ${cls}">${text}</div>
        <p style="text-align:center; color:#5d6d7e; margin-bottom:1rem;">
            Probabilidade média: <strong>${pct(r.average_probability)}</strong> |
            Ponderada: <strong>${pct(r.weighted_probability)}</strong>
        </p>
        <div class="result-details">
            <div class="model-card">
                <div class="model-name">MLP (Rede Neural)</div>
                <div class="model-prob" style="color:${barColor(r.mlp_probability)}">${pct(r.mlp_probability)}</div>
                <div class="prob-bar"><div class="prob-bar-fill" style="width:${r.mlp_probability*100}%; background:${barColor(r.mlp_probability)}"></div></div>
                <div class="model-verdict">${r.mlp_prediction ? 'Positivo' : 'Negativo'}</div>
            </div>
            <div class="model-card">
                <div class="model-name">LightGBM</div>
                <div class="model-prob" style="color:${barColor(r.lgbm_probability)}">${pct(r.lgbm_probability)}</div>
                <div class="prob-bar"><div class="prob-bar-fill" style="width:${r.lgbm_probability*100}%; background:${barColor(r.lgbm_probability)}"></div></div>
                <div class="model-verdict">${r.lgbm_prediction ? 'Positivo' : 'Negativo'}</div>
            </div>
            <div class="model-card">
                <div class="model-name">XGBoost</div>
                <div class="model-prob" style="color:${barColor(r.xgb_probability)}">${pct(r.xgb_probability)}</div>
                <div class="prob-bar"><div class="prob-bar-fill" style="width:${r.xgb_probability*100}%; background:${barColor(r.xgb_probability)}"></div></div>
                <div class="model-verdict">${r.xgb_prediction ? 'Positivo' : 'Negativo'}</div>
            </div>
        </div>
        <div class="unanimous-badge" style="color:${r.unanimous ? '#c0392b' : '#5d6d7e'}">
            ${r.unanimous ? 'Todos os modelos concordam (Unânime)' : 'Os modelos divergem na classificação'}
        </div>
    `;
    card.style.display = 'block';
    card.scrollIntoView({ behavior: 'smooth' });
}

function showError(msg) {
    const card = document.getElementById('resultCard');
    const content = document.getElementById('resultContent');
    content.innerHTML = `<div class="error-msg">${msg}</div>`;
    card.style.display = 'block';
}

// Set default dates
document.getElementById('notification_date').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
